<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>账号管理 - 自动化控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 50; }
        .modal.active { display: flex; }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { 
            display: none; position: absolute; right: 0; background-color: #1e293b; 
            min-width: 100px; border: 1px solid #334155; z-index: 10; border-radius: 4px;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .status-running { color: #6366f1; }
        .status-failed { color: #ef4444; }
        .status-pending { color: #f59e0b; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">账号执行列表</h1>
            <button onclick="fetchTasks()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm transition">
                <i class="fas fa-sync-alt mr-2"></i>刷新数据
            </button>
        </div>

        <div class="card rounded-lg overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-800 text-slate-400 uppercase text-xs">
                    <tr>
                        <th class="px-6 py-4">任务ID</th>
                        <th class="px-6 py-4">邮箱</th>
                        <th class="px-6 py-4">状态</th>
                        <th class="px-6 py-4">类型</th>
                        <th class="px-6 py-4 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modifyModal" class="modal">
        <div class="card p-6 w-96 rounded-xl shadow-2xl">
            <h3 class="text-lg font-semibold mb-4 flex items-center">
                <i class="fas fa-edit mr-2 text-indigo-500"></i>修改账号信息
            </h3>
            <input type="hidden" id="editTaskId">
            <input type="hidden" id="editDbId">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">谷歌邮箱</label>
                    <input type="text" id="editEmail" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">账号密码</label>
                    <input type="password" id="editPassword" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">2FA 密钥</label>
                    <input type="text" id="editTwofa" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:border-indigo-500 outline-none">
                </div>
            </div>
            <div class="flex justify-end mt-6 space-x-3">
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-sm">取消</button>
                <button onclick="submitModification()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded text-sm font-medium">确认提交</button>
            </div>
        </div>
    </div>

    <script>
        let tasksData = [];

        async function fetchTasks() {
            try {
                const res = await fetch('/api/tasks');
                const result = await res.json();
                if (result.success) {
                    tasksData = result.data;
                    renderTable();
                }
            } catch (e) { console.error("加载失败", e); }
        }

        function renderTable() {
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = tasksData.map(task => {
                let actionHtml = '';
                
                if (task.status === 'Pending') {
                    // Pending状态显示取消按钮
                    actionHtml = `<button onclick="cancelTask(${task.id}, ${task.task_id})" class="text-amber-500 hover:text-amber-400 text-xs">取消排队</button>`;
                } else if (task.status === 'Running') {
                    // Running状态禁用操作
                    actionHtml = `<span class="text-slate-500 text-xs italic">执行中禁止操作</span>`;
                } else if (task.status === 'Failed') {
                    // Failed状态显示下拉菜单
                    actionHtml = `
                        <div class="dropdown">
                            <button class="text-indigo-400 hover:text-indigo-300 text-xs font-medium">
                                处理 <i class="fas fa-chevron-down ml-1 text-[10px]"></i>
                            </button>
                            <div class="dropdown-content">
                                <a href="javascript:void(0)" onclick="retryTask(${task.id})" class="block px-4 py-2 hover:bg-slate-700 text-xs text-emerald-400">重试任务</a>
                                <a href="javascript:void(0)" onclick="openModifyModal(${task.id})" class="block px-4 py-2 hover:bg-slate-700 text-xs text-indigo-400">修改重提</a>
                            </div>
                        </div>
                    `;
                } else {
                    actionHtml = `<span class="text-slate-600">--</span>`;
                }

                return `
                <tr class="border-t border-slate-700/50 hover:bg-slate-800/30 transition">
                    <td class="px-6 py-4 font-mono text-xs text-slate-400">${task.task_id}</td>
                    <td class="px-6 py-4">${task.email}</td>
                    <td class="px-6 py-4">
                        <span class="status-${task.status.toLowerCase()} flex items-center">
                            <i class="fas fa-circle text-[8px] mr-2"></i>${task.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-xs">${task.task_type || 'full'}</td>
                    <td class="px-6 py-4 text-right">${actionHtml}</td>
                </tr>`;
            }).join('');
        }

        async function cancelTask(dbId, taskId) {
            if(!confirm("确定要取消此排队任务吗？")) return;
            const res = await fetch('/api/cancel_task', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: dbId, task_id: taskId, cdkey: localStorage.getItem('user_cdkey') })
            });
            const data = await res.json();
            alert(data.message);
            fetchTasks();
        }

        async function retryTask(dbId) {
            const res = await fetch('/api/retry_task', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: dbId })
            });
            const data = await res.json();
            alert(data.message);
            fetchTasks();
        }

        function openModifyModal(dbId) {
            const task = tasksData.find(t => t.id === dbId);
            document.getElementById('editDbId').value = dbId;
            document.getElementById('editEmail').value = task.email;
            document.getElementById('editPassword').value = task.password;
            document.getElementById('editTwofa').value = task.twofa || '';
            document.getElementById('modifyModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modifyModal').classList.remove('active');
        }

        async function submitModification() {
            const old_id = document.getElementById('editDbId').value;
            const payload = {
                email: document.getElementById('editEmail').value,
                password: document.getElementById('editPassword').value,
                twofa: document.getElementById('editTwofa').value,
                cdkey: localStorage.getItem('user_cdkey'),
                old_id: old_id,
                task_type: 'full'
            };

            const res = await fetch('/api/submit_task', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.success) {
                alert("修改并提交成功！");
                closeModal();
                fetchTasks();
            } else {
                alert("提交失败: " + data.message);
            }
        }

        // 页面加载后自动拉取
        fetchTasks();
    </script>
</body>
</html>
